<!DOCTYPE html>
<html>
<body style="margin:0;background:black;">

<iframe id="screen" width="100%" height="100%" style="border:none;"></iframe>

<script>

let screens = [
  "./screen-ops.html",
  "./screen-ticker.html",
  "./screen-alerts.html"
];

let index = 0;
let frame = document.getElementById("screen");

// ✅ Load FIRST screen immediately
frame.src = screens[0];

// ✅ Rotate screens
setInterval(()=>{
  index = (index + 1) % screens.length;
  frame.src = screens[index];
},60000);

</script>

</body>
</html>
