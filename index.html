<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Aviation Ops Intelligence</title>

<style>
body{
  margin:0;
  background:#020617;
  color:#fff;
  font-family:Arial;
  overflow:hidden;
}

/* HEADER */
.header{
  background:linear-gradient(90deg,#b91c1c,#ef4444,#f97316);
  padding:12px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.title{font-size:26px;font-weight:bold}
.time{font-size:20px}

/* LAYOUT */
.main{
  display:grid;
  grid-template-columns:70% 30%;
  height:calc(100vh - 110px);
}

/* LEFT SIDE */
.left{
  padding:20px;
}

.headline{
  font-size:40px;
  font-weight:bold;
  margin-bottom:15px;
}

.subtext{
  font-size:18px;
  color:#cbd5e1;
  margin-bottom:20px;
}

.cards{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
}

.card{
  background:#0f172a;
  padding:12px;
  border-radius:10px;
  border:1px solid #1e293b;
}

/* RIGHT SIDE */
.right{
  padding:15px;
  display:flex;
  flex-direction:column;
  gap:12px;
  border-left:1px solid #1e293b;
}

.panel{
  background:#0f172a;
  padding:12px;
  border-radius:10px;
  border:1px solid #1e293b;
}

.awb{
  border:2px solid #38bdf8;
  background:#082f49;
}

/* TICKER */
.ticker{
  height:50px;
  background:#000;
  display:flex;
  align-items:center;
  overflow:hidden;
}
.scroll{
  white-space:nowrap;
  animation:scroll 40s linear infinite;
}
@keyframes scroll{
  from{transform:translateX(100%)}
  to{transform:translateX(-100%)}
}
</style>
</head>

<body>

<div class="header">
  <div class="title">LIVE AVIATION OPERATIONS DESK</div>
  <div class="time" id="clock"></div>
</div>

<div class="main">

  <div class="left">
    <div class="headline" id="headline">Loading...</div>
    <div class="subtext" id="desc"></div>

    <div class="cards" id="cards"></div>
  </div>

  <div class="right">

    <div class="panel awb" id="awb">Loading AWB...</div>

    <div class="panel">
      <b>INCIDENTS / DISRUPTIONS</b>
      <div id="incidents"></div>
    </div>

    <div class="panel">
      <b>MIDDLE EAST</b>
      <div id="me"></div>
    </div>

    <div class="panel">
      <b>CARGO / OPS</b>
      <div id="ops"></div>
    </div>

  </div>

</div>

<div class="ticker">
  <div class="scroll" id="ticker">Loading...</div>
</div>

<script>

// CLOCK
function updateClock(){
  document.getElementById("clock").innerHTML =
    new Date().toLocaleTimeString("en-GB",{timeZone:"Asia/Dubai"});
}
setInterval(updateClock,1000);
updateClock();

// NEWS
let news=[];

async function loadNews(){
  const res = await fetch("https://api.rss2json.com/v1/api.json?rss_url=https://simpleflying.com/feed/");
  const data = await res.json();
  news = data.items;
  renderNews();
}

function renderNews(){
  if(!news.length) return;

  let lead = news[0];

  document.getElementById("headline").innerHTML = lead.title;
  document.getElementById("desc").innerHTML = lead.description.slice(0,150)+"...";

  document.getElementById("cards").innerHTML =
    news.slice(1,5).map(n=><div class="card">${n.title}</div>).join("");

  document.getElementById("incidents").innerHTML =
    news.slice(0,3).map(n=>"⚠️ "+n.title).join("<br><br>");

  document.getElementById("me").innerHTML =
    news.slice(3,6).map(n=>"🌍 "+n.title).join("<br><br>");

  document.getElementById("ops").innerHTML =
    news.slice(6,9).map(n=>"📦 "+n.title).join("<br><br>");

  document.getElementById("ticker").innerHTML =
    news.map(n=>"✈️ "+n.title).join(" • ");
}

loadNews();

// ROTATE HEADLINE
setInterval(()=>{
  news.push(news.shift());
  renderNews();
},10000);

// AWB
let awbs=[];
let i=0;

async function loadAWB(){
  const res = await fetch("https://sakash0270.github.io/aviation-dashboard/awb-data.json");
  awbs = await res.json();
  showAWB();
}

function showAWB(){
  if(!awbs.length) return;

  let s = awbs[i % awbs.length];
  let now=new Date();
  let dep=new Date(s.departure);
  let arr=new Date(s.arrival);

  let status="";
  if(now<dep){
    status=((dep-now)/3600000).toFixed(1)+" hrs to departure";
  }else if(now<arr){
    status="Airborne • "+((arr-now)/3600000).toFixed(1)+" hrs remaining";
  }else{
    status="Arrived";
  }

  document.getElementById("awb").innerHTML =
    <b>${s.awb}</b><br>${s.origin} → ${s.destination}<br><br>${status};

  i++;
}

setInterval(showAWB,6000);
loadAWB();

</script>

</body>
</html>
