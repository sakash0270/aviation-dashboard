<!DOCTYPE html>
<html>
<body style="margin:0;background:black;">

<iframe id="screen" style="width:100%;height:100vh;border:none;"></iframe>

<script>

// load screens from full URL (fixes blank issue)
const screens = [
  "https://sakash0270.github.io/aviation-dashboard/screen-ops.html",
  "https://sakash0270.github.io/aviation-dashboard/screen-ticker.html",
  "https://sakash0270.github.io/aviation-dashboard/screen-alerts.html"
];

let i = 0;

// load first screen immediately
document.getElementById("screen").src = screens[0];

// rotate every 60 sec
setInterval(() => {
  i = (i + 1) % screens.length;
  document.getElementById("screen").src = screens[i];
}, 60000);

</script>

</body>
</html>
