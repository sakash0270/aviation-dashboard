<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Aviation Ops Intelligence V6</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#020617;
  color:white;
  overflow:hidden;
}

/* HEADER */
.header{
  height:70px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 20px;
  background:linear-gradient(90deg,#991b1b,#ef4444,#f97316);
}
.title{font-size:26px;font-weight:bold}
.clock{text-align:right}

/* LAYOUT */
.main{
  display:grid;
  grid-template-columns:65% 35%;
  height:calc(100vh - 120px);
}
.left{padding:18px}
.right{
  padding:12px;
  display:grid;
  grid-template-rows:1.4fr 1fr 1fr 1fr;
  gap:10px;
  border-left:1px solid #1e293b;
}

/* LEFT CONTENT */
.headline{font-size:40px;font-weight:900}
.desc{color:#cbd5e1;font-size:18px;margin-top:8px}
.cards{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:15px}
.card{background:#0f172a;border-radius:10px;padding:10px}

/* RIGHT PANELS */
.panel,.awb{
  background:#0f172a;
  border-radius:12px;
  padding:12px;
}

/* AWB */
.awb{
  border:2px solid #38bdf8;
}
.route{font-size:20px;font-weight:bold}
.status{color:#fde68a;margin-top:6px}

/* MAP */
.map{
  height:120px;
  background:linear-gradient(135deg,#0e7490,#0f172a);
  border-radius:10px;
  margin-top:10px;
  position:relative;
}
.plane{
  position:absolute;
  font-size:22px;
  animation:fly 6s linear infinite;
}
@keyframes fly{
  0%{left:20%;top:60%}
  50%{left:50%;top:40%}
  100%{left:75%;top:20%}
}

/* TICKER */
.ticker{
  height:50px;
  display:flex;
  align-items:center;
  background:black;
}
.scroll{
  white-space:nowrap;
  animation:scroll 40s linear infinite;
  padding-left:100%;
}
@keyframes scroll{
  from{transform:translateX(0)}
  to{transform:translateX(-100%)}
}
</style>
</head>

<body>

<div class="header">
  <div class="title">Office Operations Newsroom</div>
  <div class="clock" id="clock"></div>
</div>

<div class="main">

<!-- LEFT -->
<div class="left">
  <div class="headline" id="headline">Loading...</div>
  <div class="desc" id="desc"></div>

  <div class="cards" id="cards"></div>

  <div class="panel" style="margin-top:10px">
    <b>Aviation Alerts (Inbox Feed)</b>
    <div id="alerts"></div>
  </div>

  <div class="panel" style="margin-top:10px">
    <b>Safety / Accident Spotlight</b>
    <div id="safety"></div>
  </div>
</div>

<!-- RIGHT -->
<div class="right">

<div class="awb" id="awbBox">Loading AWB...</div>

<div class="panel">
  <b>Incidents / Disruptions</b>
  <div id="incidents"></div>
</div>

<div class="panel">
  <b>Middle East</b>
  <div id="me"></div>
</div>

<div class="panel">
  <b>Cargo / Ops</b>
  <div id="ops"></div>
</div>

</div>
</div>

<div class="ticker">
  <div class="scroll" id="ticker"></div>
</div>

<script>

let news=[], awbs=[], alerts=[], accidents=[]
let i=0,a=0,s=0

/* CLOCK */
setInterval(()=>{
 let now=new Date()
 document.getElementById("clock").innerHTML=
 now.toLocaleTimeString("en-GB",{timeZone:"Asia/Dubai"})
},1000)

/* NEWS */
function loadNews(){
 fetch("https://api.rss2json.com/v1/api.json?rss_url=https://simpleflying.com/feed/")
 .then(r=>r.json())
 .then(d=>{
   news=d.items
   renderNews()
 })
 .catch(()=>{})
}

function renderNews(){
 if(!news.length)return
 let item=news[i%news.length]

 document.getElementById("headline").innerText=item.title
 document.getElementById("desc").innerText=item.description.replace(/<[^>]*>/g,"").slice(0,150)

 document.getElementById("cards").innerHTML=
 news.slice(1,5).map(x=><div class="card">${x.title}</div>).join("")

 document.getElementById("ticker").innerHTML=
 news.map(x=>"✈️ "+x.title).join(" • ")

 i++
}

/* AWB */
function loadAWB(){
 fetch("awb-data.json")
 .then(r=>r.json())
 .then(d=>{
   awbs=d
   renderAWB()
 })
}

function renderAWB(){
 if(!awbs.length)return
 let s=awbs[a%awbs.length]
 let now=new Date()
 let dep=new Date(s.departure)
 let arr=new Date(s.arrival)

 let status=""
 if(now<dep) status=((dep-now)/3600000).toFixed(1)+" hrs to departure"
 else if(now<arr) status="Airborne "+((arr-now)/3600000).toFixed(1)+" hrs remaining"
 else status="Arrived"

 document.getElementById("awbBox").innerHTML=`
 <b>AWB Shipment Watch</b>
 <div>${s.awb}</div>
 <div class="route">${s.origin} → ${s.destination}</div>
 <div class="map">
   <div class="plane">✈️</div>
 </div>
 <div class="status">${status}</div>
 <div>Flight: ${s.flight}</div>
 `
 a++
}

/* EMAIL ALERTS */
function loadAlerts(){
 fetch("email-alerts.json")
 .then(r=>r.json())
 .then(d=>{
   alerts=d
   document.getElementById("alerts").innerHTML=
   alerts.map(x=>• ${x.title}).join("<br>")
 })
}

/* ACCIDENTS */
function loadAccidents(){
 fetch("accidents.json")
 .then(r=>r.json())
 .then(d=>{
   accidents=d
   renderAccident()
 })
}

function renderAccident(){
 if(!accidents.length)return
 let x=accidents[s%accidents.length]

 document.getElementById("safety").innerHTML=
 `<b>${x.title}</b><br>
 Cause: ${x.cause}<br>
 Lesson: ${x.lesson}`

 s++
}

/* INIT */
loadNews()
loadAWB()
loadAlerts()
loadAccidents()

setInterval(renderNews,10000)
setInterval(renderAWB,6000)
setInterval(renderAccident,30000)

</script>

</body>
</html>
