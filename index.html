<!DOCTYPE html>
<html>
<head>
  <title>Aviation Operations Dashboard</title>

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial;
      overflow-x: hidden;
    }

    .dashboard {
      display: grid;
      grid-template-columns: 3fr 1fr;
      grid-template-rows: 60px auto;
      height: 100vh;
    }

    /* TICKER */
    .ticker {
      grid-column: 1 / 3;
      background: black;
      color: yellow;
      font-size: 24px;
      overflow: hidden;
      white-space: nowrap;
      border-bottom: 2px solid gray;
    }

    .ticker span {
      display: inline-block;
      padding-left: 100%;
      animation: scrollTicker 25s linear infinite;
    }

    @keyframes scrollTicker {
      0% { transform: translateX(0%); }
      100% { transform: translateX(-100%); }
    }

    /* TABLE */
    .table-container {
      padding: 20px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 18px;
    }

    th, td {
      border: 1px solid white;
      padding: 10px;
    }

    th {
      background: #111;
    }

    .on-time { background: #004d00; }
    .delayed { background: #990000; }
    .in-transit { background: #663300; }

    /* ALERTS */
    .alerts {
      padding: 20px;
      border-left: 2px solid gray;
    }

    .alert-item {
      color: red;
      font-size: 20px;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>

<div class="dashboard">

  <!-- ✅ TICKER -->
  <div class="ticker">
    <span id="tickerText">Loading...</span>
  </div>

  <!-- ✅ TABLE -->
  <div class="table-container">
    <h1>LIVE OPERATIONS</h1>
    <table>
      <thead>
        <tr>
          <th>AWB</th>
          <th>Flight</th>
          <th>Route</th>
          <th>Status</th>
          <th>Countdown</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

  <!-- ✅ ALERTS -->
  <div class="alerts">
    <h2>ALERTS</h2>
    <div id="alertList"></div>
  </div>

</div>

<script>

/* ✅ GLOBAL DATA */
let data = [];

/* ✅ FETCH DATA */
function loadData() {
  fetch('https://sakash0270.github.io/aviation-dashboard/data/flights.json')
    .then(res => {
      console.log("Status:", res.status);

      if (!res.ok) throw new Error("Fetch failed");

      return res.json();
    })
    .then(json => {
      console.log("✅ Data loaded:", json);

      data = json;
      init();
    })
    .catch(err => {
      console.error("❌ ERROR:", err);

      document.getElementById("tableBody").innerHTML =
        "<tr><td colspan='5'>DATA LOAD ERROR</td></tr>";

      document.getElementById("alertList").innerHTML =
        "<p>Error loading alerts</p>";

      document.getElementById("tickerText").innerText =
        "DATA LOAD ERROR";
    });
}
/* ✅ COUNTDOWN */
function getCountdown(time) {
  const now = new Date();
  const target = new Date(time);

  if (isNaN(target)) return "Invalid";

  const diff = Math.floor((target - now) / 60000);

  return diff < 0 ? "Completed" : diff + " min";
}

/* ✅ STATUS */
function getStatusClass(flight) {
  const now = new Date();
  const target = new Date(flight.time);
  const diff = (target - now) / 60000;

  if (flight.status === "Arrived") return "on-time";
  if (diff < -30) return "delayed";
  if (flight.status === "In Transit") return "in-transit";

  return "on-time";
}

/* ✅ TABLE */
function renderTable() {
  const tbody = document.getElementById("tableBody");
  tbody.innerHTML = "";

  data.forEach(f => {
    const cls = getStatusClass(f);

    tbody.innerHTML += `
      <tr class="${cls}">
        <td>${f.awb}</td>
        <td>${f.flight}</td>
        <td>${f.route}</td>
        <td>${f.status}</td>
        <td>${getCountdown(f.time)}</td>
      </tr>`;
  });
}

/* ✅ ALERTS */
function renderAlerts() {
  const el = document.getElementById("alertList");
  el.innerHTML = "";

  const alerts = data.filter(f => {
    const diff = (new Date(f.time) - new Date()) / 60000;
    return diff < -30 && f.status !== "Arrived";
  });

  if (!alerts.length) {
    el.innerHTML = "<p>No active alerts</p>";
    return;
  }

  alerts.forEach(f => {
    el.innerHTML += `
      <div class="alert-item">
        DELAY: ${f.awb} (${f.flight}) ${f.route}
      </div>`;
  });
}

/* ✅ TICKER */
function renderTicker() {
  const t = document.getElementById("tickerText");

  if (!data.length) {
    t.innerText = "No data available";
    return;
  }

  t.innerText = data.map(f =>
    `${f.awb} ${f.status} ✈`
  ).join(" | ");
}

/* ✅ INIT */
  function init() {
    renderTable();
    renderAlerts();
    renderTicker();
  }

  /* ✅ START */
  loadData();
  setInterval(loadData, 30000);

</script>

</body>
</html>
``
