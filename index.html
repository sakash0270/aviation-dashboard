<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Aviation Ops Intelligence Dashboard V5</title>
<meta http-equiv="refresh" content="3600">
<style>
*{box-sizing:border-box}
body{margin:0;background:#020617;color:white;font-family:Arial,Helvetica,sans-serif;overflow:hidden}
.header{height:72px;background:linear-gradient(90deg,#b91c1c,#ef4444,#f97316);display:flex;justify-content:space-between;align-items:center;padding:0 24px;font-weight:bold}
.title{font-size:28px}.time{font-size:22px;text-align:right}
.grid{height:calc(100vh - 126px);display:grid;grid-template-columns:68% 32%}
.left{padding:18px;background:linear-gradient(135deg,#020617,#0f172a)}
.right{padding:14px;background:#0b1120;border-left:1px solid #1e293b;display:grid;grid-template-rows:1.25fr 1fr 1fr 1fr;gap:12px}
.panel-title{font-size:13px;letter-spacing:3px;text-transform:uppercase;color:#93c5fd;margin-bottom:12px}
.big-headline{font-size:46px;font-weight:900;line-height:1.08;margin-bottom:16px}
.desc{font-size:20px;color:#cbd5e1;line-height:1.35;margin-bottom:18px}
.badge{display:inline-block;padding:6px 12px;border-radius:20px;margin-right:8px;font-size:13px;font-weight:bold}
.red{background:#7f1d1d;color:#fecaca}.blue{background:#075985;color:#bae6fd}.amber{background:#78350f;color:#fde68a}.green{background:#064e3b;color:#bbf7d0}
.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:20px}
.card,.sidebox{background:rgba(15,23,42,.9);border:1px solid #1e293b;border-radius:14px;padding:14px;overflow:hidden}
.card h3,.sidebox h3{font-size:13px;color:#93c5fd;margin:0 0 10px;text-transform:uppercase;letter-spacing:2px}
.card p{font-size:19px;line-height:1.25;margin:0}
.sidebox div{font-size:15px;line-height:1.35}
.metric-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.metric{background:#0f172a;border:1px solid #1e293b;border-radius:14px;padding:18px}
.metric span{color:#94a3b8;font-size:13px;text-transform:uppercase}.metric strong{display:block;font-size:44px;margin-top:8px}
.ticker{height:54px;background:#000;border-top:1px solid #7f1d1d;display:flex;align-items:center;overflow:hidden}
.live{height:100%;display:flex;align-items:center;padding:0 18px;background:#dc2626;font-weight:900;letter-spacing:3px}
.scroll{white-space:nowrap;animation:scroll 45s linear infinite;padding-left:100%;font-size:18px;font-weight:bold}
@keyframes scroll{from{transform:translateX(0)}to{transform:translateX(-100%)}}
.awb-box{background:linear-gradient(135deg,#0f172a,#082f49);border:1px solid #38bdf8;border-radius:18px;padding:16px;height:100%;position:relative;overflow:hidden}
.awb-title{font-size:12px;color:#bae6fd;text-transform:uppercase;letter-spacing:3px;margin-bottom:10px;font-weight:bold}
.awb-number{font-size:30px;font-weight:900;margin-bottom:8px}
.route{font-size:30px;font-weight:900;margin:12px 0}
.status{font-size:21px;font-weight:800;color:#fde68a;margin:10px 0}
.flight{font-size:15px;color:#cbd5e1}
.route-line{height:42px;margin-top:10px;position:relative}
.line{position:absolute;top:21px;left:0;right:0;height:3px;background:#38bdf8;border-radius:5px}
.plane{position:absolute;top:0;font-size:30px;animation:fly 6s linear infinite}
@keyframes fly{from{left:0}to{left:88%}}
.accident-mode{background:linear-gradient(135deg,#111827,#450a0a)}
.accident-grid{display:grid;grid-template-columns:1.2fr .8fr;gap:18px;height:100%}
.visuals{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:18px}
.visual{height:160px;border-radius:16px;border:1px solid #334155;background:linear-gradient(135deg,#1e293b,#020617);display:flex;align-items:center;justify-content:center;text-align:center;padding:12px;color:#cbd5e1;font-size:17px}
.lesson{background:rgba(0,0,0,.35);border:1px solid #7f1d1d;border-radius:18px;padding:18px}
.lesson h2{margin-top:0;color:#fecaca}.lesson p{font-size:19px;line-height:1.4}
</style>
</head>

<body>

<div class="header">
  <div>
    <div style="font-size:12px;letter-spacing:4px;">LIVE AVIATION OPS INTELLIGENCE</div>
    <div class="title">Office Operations Newsroom</div>
  </div>
  <div class="time" id="clock">Dubai Time</div>
</div>

<div class="grid">
  <div class="left" id="mainPanel">Loading aviation intelligence...</div>

  <div class="right">
    <div class="awb-box" id="awbBox">Loading AWB watch...</div>

    <div class="sidebox">
      <h3>Incidents / Disruptions</h3>
      <div id="sideIncidents">Loading...</div>
    </div>

    <div class="sidebox">
      <h3>Middle East / Gulf</h3>
      <div id="sideME">Loading...</div>
    </div>

    <div class="sidebox">
      <h3>Cargo / MRO / Ops</h3>
      <div id="sideOps">Loading...</div>
    </div>
  </div>
</div>

<div class="ticker">
  <div class="live">LIVE</div>
  <div class="scroll" id="ticker">Loading ticker...</div>
</div>

<script>
let pool=[];
let awbs=[];
let currentPanel=0;
let awbIndex=0;
let accidentActive=false;
let usedAccidents=[];

const feeds=[
  {name:"Simple Flying",url:"https://simpleflying.com/feed/"},
  {name:"AeroTime",url:"https://www.aerotime.aero/rss"},
  {name:"Aviation24",url:"https://www.aviation24.be/feed/"},
  {name:"AIN Online",url:"https://www.ainonline.com/rss.xml"},
  {name:"Airways Magazine",url:"https://airwaysmag.com/feed/"},
  {name:"Aviation A2Z",url:"https://aviationa2z.com/index.php/feed/"},
  {name:"Unmanned Airspace",url:"https://www.unmannedairspace.info/feed/"}
];

const accidents=[
  {title:"Tenerife Airport Disaster – 1977",impact:"Two Boeing 747 aircraft collided on the runway at Los Rodeos Airport.",cause:"Miscommunication, radio interference, fog, runway confusion and authority-gradient issues.",lesson:"Clear communication, readback discipline, runway awareness and CRM are critical.",visuals:["Runway visibility / fog","Aircraft movement conflict","Communication breakdown"]},
  {title:"Air France Flight 447 – 2009",impact:"Airbus A330 crashed into the Atlantic during cruise.",cause:"Pitot icing, automation disconnect, startle effect and inappropriate manual inputs.",lesson:"Manual flying skill, upset recovery and automation awareness are critical.",visuals:["High altitude weather","Airspeed data failure","Automation transition"]},
  {title:"British Airways Flight 38 – 2008",impact:"Boeing 777 landed short of Heathrow runway.",cause:"Ice crystals restricted fuel flow through the fuel-oil heat exchanger.",lesson:"Fuel system behaviour in cold conditions drove design and procedure improvements.",visuals:["Final approach","Fuel restriction","Short landing"]},
  {title:"Qantas Flight 32 – 2010",impact:"Airbus A380 suffered uncontained engine failure after departure.",cause:"Manufacturing defect in oil feed pipe caused fire and turbine disc failure.",lesson:"CRM, systems knowledge and calm checklist handling prevented disaster.",visuals:["Engine failure","System damage","Safe return"]}
];

function esc(t){return String(t||"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[m]))}
function clean(html){let d=document.createElement("div");d.innerHTML=html||"";return(d.textContent||d.innerText||"").replace(/\s+/g," ").trim()}
function short(t,n=160){if(!t)return"";return t.length>n?t.slice(0,n)+"...":t}
function hoursBetween(a,b){return (b-a)/36e5}
function fmtHours(h){return Math.max(0,h).toFixed(1)}
function updateClock(){
  let now=new Date();
  document.getElementById("clock").innerHTML=
    now.toLocaleTimeString("en-GB",{timeZone:"Asia/Dubai",hour12:false})+
    "<br><span style='font-size:13px;color:#fee2e2'>"+
    now.toLocaleDateString("en-GB",{timeZone:"Asia/Dubai",weekday:"short",day:"2-digit",month:"short"})+
    "</span>";
}
setInterval(updateClock,1000);updateClock();

async function fetchRSS(feed){
  const api="https://api.rss2json.com/v1/api.json?rss_url="+encodeURIComponent(feed.url);
  const res=await fetch(api);
  const data=await res.json();
  if(!data.items)throw new Error("No items");
  return data.items.map(i=>({title:i.title||"",desc:clean(i.description||i.content||""),source:feed.name}));
}

async function loadFeeds(){
  let results=[];
  for(const f of feeds){
    try{results=results.concat(await fetchRSS(f))}catch(e){}
  }
  let seen=new Set();
  pool=results.filter(i=>{let k=i.title.toLowerCase();if(!k||seen.has(k))return false;seen.add(k);return true});
  if(!pool.length){
    pool=[
      {title:"Live feeds temporarily unavailable. Dashboard will retry automatically.",desc:"Network or feed API may be temporarily unavailable.",source:"System"},
      {title:"AOG response time matters more than rate in critical movements.",desc:"Operational reminder.",source:"Ops Reminder"}
    ];
  }
  renderAll();
}

async function loadAWB(){
  try{
    const res=await fetch("awb-data.json?cache="+Date.now());
    awbs=await res.json();
    if(!Array.isArray(awbs))awbs=[];
  }catch(e){
    awbs=[
      {awb:"SAMPLE-001",origin:"DXB",destination:"FRA",flight:"EK000",departure:"2026-05-01T23:45:00+04:00",arrival:"2026-05-02T06:30:00+02:00"}
    ];
  }
  renderAWB();
}

function typeOf(item){
  let t=(item.title+" "+item.desc).toLowerCase();
  if(/accident|incident|emergency|diversion|delay|storm|weather|closure|airspace|grounded|security|evacuation|collision/.test(t))return"incident";
  if(/dubai|uae|abu dhabi|gulf|qatar|saudi|riyadh|jeddah|doha|kuwait|oman|bahrain|emirates|etihad/.test(t))return"me";
  if(/cargo|mro|maintenance|engine|component|aircraft part|supply chain|freight|logistics|aog|airshow|event|exhibition|conference|expo|summit/.test(t))return"ops";
  return"news";
}

function renderAll(){renderPanel();renderSide();renderTicker()}
function renderSide(){
  const inc=pool.filter(i=>typeOf(i)==="incident").slice(0,3);
  const me=pool.filter(i=>typeOf(i)==="me").slice(0,3);
  const ops=pool.filter(i=>typeOf(i)==="ops").slice(0,3);
  document.getElementById("sideIncidents").innerHTML=(inc.length?inc:[{title:"No major disruption classified currently."}]).map(i=>"⚠️ "+esc(short(i.title,90))+"<br><br>").join("");
  document.getElementById("sideME").innerHTML=(me.length?me:[{title:"Monitoring Gulf / Middle East aviation updates."}]).map(i=>"🌍 "+esc(short(i.title,90))+"<br><br>").join("");
  document.getElementById("sideOps").innerHTML=(ops.length?ops:[{title:"Monitoring cargo, MRO, airline ops, events and supply chain updates."}]).map(i=>"📦 "+esc(short(i.title,90))+"<br><br>").join("");
}
function renderTicker(){
  let txt=pool.slice(0,18).map(i=>"✈️ "+i.title).join(" • ");
  if(awbs.length)txt+=" • 📦 AWB Watch active: "+awbs.length+" shipments monitored";
  txt+=" • ⚡ AOG response time matters more than rate • ⚠️ Monitor NOTAM, weather, route closures and security advisories •";
  document.getElementById("ticker").innerHTML=esc(txt);
}

function renderAWB(){
  const box=document.getElementById("awbBox");
  if(!awbs.length){
    box.innerHTML=<div class="awb-title">Shipment Watch</div><div>No AWB data found</div>;
    return;
  }

  const s=awbs[awbIndex % awbs.length];
  const now=new Date();
  const dep=new Date(s.departure);
  const arr=new Date(s.arrival);

  let status="", routeVisual="", badge="";

  if(now < dep){
    status=${fmtHours(hoursBetween(now,dep))} hrs to departure;
    badge="Pending Departure";
    routeVisual=<div class="route-line"><div class="line"></div><div style="position:absolute;left:0;top:0;font-size:28px">📦</div></div>;
  } else if(now >= dep && now < arr){
    status=Departed · ${fmtHours(hoursBetween(now,arr))} hrs to destination;
    badge="Airborne";
    routeVisual=<div class="route-line"><div class="line"></div><div class="plane">✈️</div></div>;
  } else {
    status="Shipment arrived destination";
    badge="Arrived";
    routeVisual=<div class="route-line"><div class="line"></div><div style="position:absolute;right:0;top:0;font-size:28px">✅</div></div>;
  }

  box.innerHTML=`
    <div class="awb-title">AWB Shipment Watch</div>
    <div class="awb-number">${esc(s.awb)}</div>
    <span class="badge green">${esc(badge)}</span>
    <div class="route">${esc(s.origin)} → ${esc(s.destination)}</div>
    ${routeVisual}
    <div class="status">${esc(status)}</div>
    <div class="flight">Flight: ${esc(s.flight||"N/A")}</div>
    <div class="flight">Departure: ${esc(s.departure)}</div>
    <div class="flight">Arrival: ${esc(s.arrival)}</div>
  `;

  awbIndex++;
}
setInterval(renderAWB,7000);

function renderPanel(){
  if(accidentActive)return renderAccident();
  const panels=["headlines","incidents","me","ops","metrics"];
  const p=panels[currentPanel%panels.length];
  if(p==="headlines")renderHeadlines();
  if(p==="incidents")renderCategory("Incidents & Disruptions","incident");
  if(p==="me")renderCategory("Middle East / Gulf Focus","me");
  if(p==="ops")renderCategory("Cargo / MRO / Events / Ops","ops");
  if(p==="metrics")renderMetrics();
}
function renderHeadlines(){
  let lead=pool[0]||{};
  let others=pool.slice(1,7);
  document.getElementById("mainPanel").className="left";
  document.getElementById("mainPanel").innerHTML=`
    <div class="panel-title">Top Aviation Story</div>
    <div class="big-headline">${esc(lead.title)}</div>
    <div class="desc">${esc(short(lead.desc,220))}</div>
    <span class="badge red">Breaking</span><span class="badge blue">${esc(lead.source)}</span>
    <div class="cards">${others.map(i=><div class="card"><h3>${esc(i.source)}</h3><p>${esc(short(i.title,110))}</p></div>).join("")}</div>`;
}
function renderCategory(title,type){
  let items=pool.filter(i=>typeOf(i)===type).slice(0,6);
  if(!items.length)items=[{title:"No specific item classified currently. Monitoring continues.",desc:"Waiting for relevant live feed updates.",source:"System"}];
  document.getElementById("mainPanel").className="left";
  document.getElementById("mainPanel").innerHTML=`
    <div class="panel-title">${title}</div>
    <div class="cards" style="grid-template-columns:repeat(2,1fr)">
      ${items.map(i=><div class="card"><h3>${esc(i.source)}</h3><p>${esc(short(i.title,140))}</p><div style="font-size:15px;color:#cbd5e1;margin-top:10px">${esc(short(i.desc,140))}</div></div>).join("")}
    </div>`;
}
function renderMetrics(){
  let incident=pool.filter(i=>typeOf(i)==="incident").length;
  let me=pool.filter(i=>typeOf(i)==="me").length;
  let ops=pool.filter(i=>typeOf(i)==="ops").length;
  let total=pool.length;
  document.getElementById("mainPanel").className="left";
  document.getElementById("mainPanel").innerHTML=`
    <div class="panel-title">Operations Snapshot</div>
    <div class="metric-row">
      <div class="metric"><span>Total Live Items</span><strong>${total}</strong></div>
      <div class="metric"><span>Disruptions</span><strong>${incident}</strong></div>
      <div class="metric"><span>Middle East</span><strong>${me}</strong></div>
      <div class="metric"><span>Cargo / MRO / Events</span><strong>${ops}</strong></div>
    </div>
    <div class="cards">
      <div class="card"><h3>AWB Watch</h3><p>${awbs.length} shipments rotating every 7 seconds.</p></div>
      <div class="card"><h3>Ops Cue</h3><p>AOG shipments need speed, escalation contacts, and route awareness.</p></div>
      <div class="card"><h3>Next Phase</h3><p>Outlook Aviation Alerts folder can feed PitchBook / Orient updates later.</p></div>
    </div>`;
}
function renderAccident(){
  if(usedAccidents.length===accidents.length)usedAccidents=[];
  let available=accidents.map((_,i)=>i).filter(i=>!usedAccidents.includes(i));
  let idx=available[Math.floor(Math.random()*available.length)];
  usedAccidents.push(idx);
  let a=accidents[idx];
  document.getElementById("mainPanel").className="left accident-mode";
  document.getElementById("mainPanel").innerHTML=`
    <div class="panel-title" style="color:#fecaca">15-Second Aviation Safety Learning Slide</div>
    <div class="accident-grid">
      <div>
        <div class="big-headline">${esc(a.title)}</div>
        <div class="visuals">${a.visuals.map(v=><div class="visual">📷<br>${esc(v)}</div>).join("")}</div>
      </div>
      <div class="lesson">
        <h2>Impact</h2><p>${esc(a.impact)}</p>
        <h2>Cause Found</h2><p>${esc(a.cause)}</p>
        <h2>Operational Lesson</h2><p>${esc(a.lesson)}</p>
      </div>
    </div>`;
}

setInterval(()=>{if(!accidentActive){currentPanel++;renderPanel()}},12000);
setInterval(()=>{accidentActive=true;renderPanel();setTimeout(()=>{accidentActive=false;renderPanel()},15000)},1800000);

loadFeeds();setInterval(loadFeeds,900000);
loadAWB();setInterval(loadAWB,60000);
</script>

</body>
</html>
