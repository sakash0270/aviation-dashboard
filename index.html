<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Aviation Operations Dashboard</title>

<style>
*{box-sizing:border-box}
body{margin:0;background:#020617;color:#fff;font-family:Arial,Helvetica,sans-serif;overflow:hidden}
.header{height:70px;background:linear-gradient(90deg,#b91c1c,#ef4444,#f97316);display:flex;justify-content:space-between;align-items:center;padding:0 22px;font-weight:800}
.header small{font-size:11px;letter-spacing:4px}
.header-title{font-size:28px}
.clock{text-align:right;font-size:22px}

.main{height:calc(100vh - 120px);display:grid;grid-template-columns:68% 32%}
.left{padding:22px;background:#020617}
.right{padding:16px;background:#08111f;border-left:1px solid #1e293b;display:grid;grid-template-rows:1.2fr 1fr 1fr 1fr;gap:14px}

.kicker{color:#93c5fd;font-size:12px;letter-spacing:3px;margin-bottom:10px}
.headline{font-size:44px;font-weight:900}
.desc{font-size:20px;color:#cbd5e1;margin-top:10px}

.panel,.awb,.card{background:#0f172a;border:1px solid #1e293b;border-radius:14px;padding:14px}
.panel h3{margin:0 0 8px;color:#93c5fd;font-size:12px;letter-spacing:2px}

.cards{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px}
.card p{font-size:18px;font-weight:700;margin:0}

.awb-title{font-size:12px;letter-spacing:3px;color:#93c5fd;margin-bottom:6px}
.awb-no{font-size:26px;font-weight:900}
.route{font-size:24px;font-weight:900;margin:6px 0}

.ticker{height:50px;background:#000;display:flex;align-items:center;border-top:1px solid #7f1d1d}
.live{background:#dc2626;padding:0 18px;font-weight:900}
.scroll{white-space:nowrap;padding-left:50px;font-weight:800}
</style>
</head>

<body>

<div class="header">
  <div>
    <small>LIVE AVIATION OPS INTELLIGENCE</small>
    <div class="header-title">Office Operations Newsroom</div>
  </div>
  <div class="clock" id="clock"></div>
</div>

<div class="main">
  <div class="left">
    <div class="kicker">Top Aviation Story</div>
    <div class="headline" id="headline"></div>
    <div class="desc" id="desc"></div>
    <div class="cards" id="cards"></div>
  </div>

  <div class="right">
    <div class="awb" id="awbBox"></div>

    <div class="panel">
      <h3>Incidents / Disruptions</h3>
      ⚠️ Monitoring delays, weather & airspace
    </div>

    <div class="panel">
      <h3>Middle East / Gulf</h3>
      🌍 UAE, KSA, Qatar, Oman
    </div>

    <div class="panel">
      <h3>Cargo / MRO / Ops</h3>
      📦 AOG, MRO, supply chain
    </div>
  </div>
</div>

<div class="ticker">
  <div class="live">LIVE</div>
  <div class="scroll" id="ticker"></div>
</div>

<script>
const news=[
  {
    title:"AOG response time matters more than rate",
    desc:"Speed, escalation and aircraft-on-ground priority dominate urgent aviation logistics."
  },
  {
    title:"Middle East hubs remain critical cargo gateways",
    desc:"DXB, DWC and AUH continue to lead time-critical shipments."
  }
];

function updateClock(){
  const n=new Date();
  clock.innerHTML=
    n.toLocaleTimeString("en-GB",{timeZone:"Asia/Dubai",hour12:false})+
    "<br><span style='font-size:12px'>"+
    n.toLocaleDateString("en-GB",{timeZone:"Asia/Dubai",weekday:"short",day:"2-digit",month:"short"})+
    "</span>";
}

function render(){
  headline.innerText=news[0].title;
  desc.innerText=news[0].desc;

  cards.innerHTML=news.map(n=>`
    <div class="card"><p>${n.title}</p></div>
  `).join("");

  awbBox.innerHTML=`
    <div class="awb-title">AWB SHIPMENT WATCH</div>
    <div class="awb-no">176‑12345678</div>
    <div class="route">DXB → FRA</div>
    <div>✈️ Airborne • 5.2 hrs remaining</div>
  `;

  ticker.innerText=news.map(n=>"✈️ "+n.title).join(" • ");
}

updateClock();
setInterval(updateClock,1000);
render();
</script>

</body>
</html>
