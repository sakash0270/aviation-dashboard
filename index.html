<!DOCTYPE html>
<html>
<head>
<title>Aviation Ops Intelligence Screen</title>
<meta http-equiv="refresh" content="3600">

<style>
body{
margin:0;
font-family:Arial;
background:#000;
color:#fff;
overflow:hidden;
}

.header{
background:linear-gradient(to right, red, orange);
padding:12px;
font-size:22px;
font-weight:bold;
}

.main{
display:flex;
height:calc(100vh - 80px);
}

.left{
width:70%;
padding:20px;
}

.right{
width:30%;
background:#111;
padding:15px;
}

.box{
margin-bottom:12px;
padding:10px;
border:1px solid #333;
border-radius:8px;
font-size:16px;
}

.big{
font-size:34px;
font-weight:bold;
margin-bottom:15px;
}

.small{
font-size:18px;
margin-bottom:10px;
}

.ticker{
position:fixed;
bottom:0;
width:100%;
background:#111;
padding:10px;
white-space:nowrap;
overflow:hidden;
}

.scroll{
display:inline-block;
padding-left:100%;
animation:scroll 30s linear infinite;
}

@keyframes scroll{
from{transform:translateX(0)}
to{transform:translateX(-100%)}
}
</style>
</head>

<body>

<div class="header">🔴 LIVE AVIATION OPERATIONS INTELLIGENCE</div>

<div class="main">
<div class="left" id="mainPanel">Loading...</div>

<div class="right">
<div class="box" id="incidents">Loading incidents...</div>
<div class="box" id="middleeast">Loading ME updates...</div>
<div class="box">⚡ AOG response priority</div>
</div>
</div>

<div class="ticker">
<div class="scroll" id="ticker">Loading...</div>
</div>

<script>

let dataPool = [];
let panelIndex = 0;

const feeds = [
"https://api.rss2json.com/v1/api.json?rss_url=https://simpleflying.com/feed/",
"https://api.rss2json.com/v1/api.json?rss_url=https://www.aerotime.aero/rss",
"https://api.rss2json.com/v1/api.json?rss_url=https://aviation24.be/feed/"
];

async function loadAllFeeds(){

dataPool = [];

for(let url of feeds){
try{
let res = await fetch(url);
let data = await res.json();

if(data.items){
data.items.forEach(i=>{
dataPool.push({
title:i.title,
desc:(i.description || "").replace(/<[^>]*>/g,""),
});
});
}

}catch(e){}
}

// remove duplicates
let seen = new Set();
dataPool = dataPool.filter(i=>{
let key=i.title.toLowerCase();
if(seen.has(key)) return false;
seen.add(key);
return true;
});

updateUI();

}

function classify(text){
text=text.toLowerCase();

if(text.match(/delay|weather|storm|incident|emergency|diversion|closure/))
return "incident";

if(text.match(/dubai|uae|abu dhabi|qatar|saudi|gulf/))
return "me";

return "normal";
}

function updateUI(){

let headlines="";
let incidents="";
let me="";
let ticker="";

let incCount=0;
let meCount=0;

dataPool.slice(0,12).forEach((item,i)=>{

let type=classify(item.title+" "+item.desc);

// MAIN HEADLINES
if(i<5){
headlines+=`<div class="small">✈ ${item.title}</div>`;
}

// INCIDENTS
if(type==="incident" && incCount<3){
incidents+=`<div>⚠ ${item.title}</div>`;
incCount++;
}

// MIDDLE EAST
if(type==="me" && meCount<3){
me+=`<div>🌍 ${item.title}</div>`;
meCount++;
}

// TICKER
ticker+=` ✈ ${item.title} • `;

});

// fallback
if(!incidents) incidents="⚠ No major disruptions";
if(!me) me="🌍 Monitoring Middle East ops";

document.getElementById("mainPanel").innerHTML=headlines;
document.getElementById("incidents").innerHTML=incidents;
document.getElementById("middleeast").innerHTML=me;

ticker+=" ⚡ AOG response matters more than rate • ";
ticker+=" ⚠ Monitor NOTAM & weather • ";

document.getElementById("ticker").innerHTML=ticker;

}

loadAllFeeds();
setInterval(loadAllFeeds,900000);

</script>

</body>
</html>
