<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Aviation Ops Dashboard</title>

<style>
body{margin:0;background:#020617;color:white;font-family:Arial}
.header{background:linear-gradient(90deg,#b91c1c,#ef4444);padding:15px;font-size:22px;font-weight:bold;display:flex;justify-content:space-between}
.grid{display:grid;grid-template-columns:70% 30%;height:calc(100vh - 60px)}
.left{padding:20px}
.right{padding:15px;border-left:1px solid #333}
.awb{border:1px solid #38bdf8;padding:15px;border-radius:12px}
</style>
</head>

<body>

<div class="header">
  Office Operations Newsroom
  <span id="clock"></span>
</div>

<div class="grid">
  <div class="left" id="news">Loading news...</div>
  <div class="right">
    <div class="awb" id="awb">Loading AWB...</div>
  </div>
</div>

<script>

// CLOCK
function updateClock(){
  document.getElementById("clock").innerHTML =
    new Date().toLocaleTimeString("en-GB",{timeZone:"Asia/Dubai"});
}
setInterval(updateClock,1000);
updateClock();

// NEWS (simple working)
async function loadNews(){
  try{
    const res = await fetch("https://api.rss2json.com/v1/api.json?rss_url=https://simpleflying.com/feed/");
    const data = await res.json();
    let html="";
    data.items.slice(0,5).forEach(i=>{
      html += "<p>✈️ "+i.title+"</p>";
    });
    document.getElementById("news").innerHTML = html;
  }catch(e){
    document.getElementById("news").innerHTML="News failed to load";
  }
}
loadNews();

// AWB
let awbs=[];
let index=0;

async function loadAWB(){
  try{
    const res = await fetch("https://sakash0270.github.io/aviation-dashboard/awb-data.json");
    awbs = await res.json();
    showAWB();
  }catch(e){
    document.getElementById("awb").innerHTML="AWB load failed";
  }
}

function showAWB(){
  if(!awbs.length) return;

  const s = awbs[index % awbs.length];
  const now = new Date();
  const dep = new Date(s.departure);
  const arr = new Date(s.arrival);

  let status="";

  if(now < dep){
    status = ((dep-now)/3600000).toFixed(1)+" hrs to departure";
  } else if(now < arr){
    status = "Airborne • "+((arr-now)/3600000).toFixed(1)+" hrs remaining";
  } else {
    status = "Arrived";
  }

  document.getElementById("awb").innerHTML = `
    <b>${s.awb}</b><br>
    ${s.origin} → ${s.destination}<br><br>
    ${status}
  `;

  index++;
}

setInterval(showAWB,5000);

loadAWB();

</script>

</body>
</html>
