<!DOCTYPE html>
<html>
<body style="background:black;color:white;font-family:Arial;">

<h2>ALERTS</h2>

<div id="alerts">Loading...</div>

<script>

fetch('https://raw.githubusercontent.com/sakash0270/aviation-dashboard/main/data/awb.json')
.then(r => r.json())
.then(data => {

let html = "";

data.data.forEach(x => {
if (x.delay === "YES") {
html += `<p style="color:red;font-size:22px">
DELAY: ${x.awb} (${x.flight}) ${x.origin}-${x.destination}
</p>`;
}
});

document.getElementById("alerts").innerHTML = html || "No alerts";

})
.catch(()=>{
document.getElementById("alerts").innerText = "ERROR";
});

</script>

</body>
</html>
