<!DOCTYPE html>
<html>
<body style="margin:0;background:black;">

<iframe id="screen" width="100%" height="100%" style="border:none;"></iframe>

<script>

let screens = [
  "screen-ops.html",
  "screen-ticker.html",
  "screen-alerts.html"
];

let i = 0;

function rotate() {
  document.getElementById("screen").src = screens[i];
  i = (i + 1) % screens.length;
}

rotate();
setInterval(rotate, 60000);

</script>

</body>
</html>
