<!DOCTYPE html>
<html>
<body style="background:black;color:white;font-family:Arial;">

<h2>LIVE OPERATIONS</h2>

<table border="1" width="100%">
<tr>
<th>AWB</th>
<th>Flight</th>
<th>Route</th>
<th>Status</th>
<th>Countdown</th>
</tr>
<tbody id="tbl"><tr><td>Loading...</td></tr></tbody>
</table>

<script>

fetch('https://raw.githubusercontent.com/sakash0270/aviation-dashboard/main/data/awb.json')
.then(res => res.json())
.then(data => {

let rows = "";

data.data.forEach(x => {

let diff = Math.floor((new Date(x.etd) - new Date()) / 60000);

let color = x.delay === "YES" ? "red" : "green";

rows += `
<tr style="background:${color};color:white">
<td>${x.awb}</td>
<td>${x.flight}</td>
<td>${x.origin}-${x.destination}</td>
<td>${x.status}</td>
<td>${diff} min</td>
</tr>`;

});

document.getElementById("tbl").innerHTML = rows;

})
.catch(()=>{
document.getElementById("tbl").innerHTML = "<tr><td>ERROR</td></tr>";
});

</script>

</body>
</html>
