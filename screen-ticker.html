<!DOCTYPE html>
<html>
<body style="background:black;color:yellow;font-size:28px;">

<marquee id="ticker">Loading...</marquee>

<script>

fetch('https://raw.githubusercontent.com/sakash0270/aviation-dashboard/main/data/awb.json')
.then(r => r.json())
.then(data => {

let text = "";

data.data.forEach(x => {
text += x.awb + " " + x.status + " ✈ | ";
});

document.getElementById("ticker").innerText = text;

})
.catch(()=>{
document.getElementById("ticker").innerText = "ERROR";
});

</script>

</body>
</html>
