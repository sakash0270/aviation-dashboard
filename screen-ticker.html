<!DOCTYPE html>
<html>
<body style="background:black;color:yellow;font-size:30px;">

<marquee id="ticker">Loading ticker...</marquee>

<script>

fetch('./data/awb.json')
.then(r=>r.json())
.then(d=>{

let text = "";

d.data.forEach(x=>{
  text += x.awb + " " + x.status + " ✈ | ";
});

document.getElementById("ticker").innerText = text;

})
.catch(()=>{
  document.getElementById("ticker").innerText = "Error loading data";
});

</script>

</body>
</html>
